services:
  - type: web
    name: binance-p2p-dashboard
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: binance-p2p-db
          property: connectionString
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_BASE_URL
        value: https://api.binance.com
      - key: SYNC_LOOKBACK_DAYS
        value: 30
      - key: SYNC_ROWS
        value: 100
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TZ
        value: America/Santiago

  - type: cron
    name: binance-p2p-sync
    runtime: python
    plan: free
    rootDir: .
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.sync
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: binance-p2p-db
          property: connectionString
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_BASE_URL
        value: https://api.binance.com
      - key: SYNC_LOOKBACK_DAYS
        value: 30
      - key: SYNC_ROWS
        value: 100
      - key: TZ
        value: America/Santiago

databases:
  - name: binance-p2p-db
    plan: starter
    databaseName: p2pdb
    user: p2puser
